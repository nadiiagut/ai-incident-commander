services:
  demo-edge-service:
    build: .
    container_name: demo-edge-service
    ports:
      - "8000:8000"
    environment:
      - DEPLOYMENT_VERSION=1.0.0
    networks:
      - incident-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - demo-edge-service
    networks:
      - incident-net

  ai-incident-analyzer:
    build: ./ai-incident-analyzer
    container_name: ai-incident-analyzer
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=incident_demo
      - CLICKHOUSE_TABLE=checkout_logs
      - IPINFO_TOKEN=${IPINFO_TOKEN:-}
    depends_on:
      - clickhouse
    networks:
      - incident-net

  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - incident-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - incident-net

  locust:
    image: locustio/locust:2.29.1
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust:ro
    environment:
      - TRAFFIC_MODE=${TRAFFIC_MODE:-manual}
      - LOCUST_HOST=http://demo-edge-service:8000
    command: -f /mnt/locust/locustfile.py
    depends_on:
      - demo-edge-service
    networks:
      - incident-net
    profiles:
      - load-test

networks:
  incident-net:
    driver: bridge

volumes:
  clickhouse-data:
